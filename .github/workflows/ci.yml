name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Prisma generate só lê o schema, não conecta -- valores fake bastam pro CI.
  DATABASE_URL: "postgresql://millead:millead@localhost:5432/millead?schema=public"
  REDIS_URL: "redis://localhost:6379"
  JWT_ACCESS_SECRET: "ci-only-access-secret-not-for-real-use"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Type-check
        run: pnpm type-check

      - name: Build
        run: pnpm build
